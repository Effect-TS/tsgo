name: Release

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changesets:
    if: github.repository_owner == 'Effect-TS'
    name: Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should_publish: ${{ steps.changesets.outputs.hasChangesets == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@v1
        with:
          commit: Release
          title: Release
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    if: needs.changesets.outputs.should_publish == 'true'
    name: Build ${{ matrix.npm_target }}
    runs-on: ubuntu-latest
    needs: [changesets]
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - npm_target: darwin-arm64
            artifact_name: tsgo-darwin-arm64
          - npm_target: darwin-x64
            artifact_name: tsgo-darwin-x64
          - npm_target: win32-x64
            artifact_name: tsgo-win32-x64
          - npm_target: win32-arm64
            artifact_name: tsgo-win32-arm64
          - npm_target: linux-x64
            artifact_name: tsgo-linux-x64
          - npm_target: linux-arm64
            artifact_name: tsgo-linux-arm64
          - npm_target: linux-arm
            artifact_name: tsgo-linux-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-release-${{ matrix.npm_target }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-release-${{ matrix.npm_target }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup repo
        run: pnpm setup-repo --ci

      - name: Build ${{ matrix.npm_target }}
        run: pnpm release:prepare --target ${{ matrix.npm_target }} --skip-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: _packages/${{ matrix.artifact_name }}

  publish:
    if: needs.changesets.outputs.should_publish == 'true'
    name: Publish
    runs-on: ubuntu-latest
    needs: [changesets, build]
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for publish support
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: tsgo-darwin-arm64
          path: _packages/tsgo-darwin-arm64

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: tsgo-darwin-x64
          path: _packages/tsgo-darwin-x64

      - name: Download win32-x64
        uses: actions/download-artifact@v4
        with:
          name: tsgo-win32-x64
          path: _packages/tsgo-win32-x64

      - name: Download win32-arm64
        uses: actions/download-artifact@v4
        with:
          name: tsgo-win32-arm64
          path: _packages/tsgo-win32-arm64

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: tsgo-linux-x64
          path: _packages/tsgo-linux-x64

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: tsgo-linux-arm64
          path: _packages/tsgo-linux-arm64

      - name: Download linux-arm
        uses: actions/download-artifact@v4
        with:
          name: tsgo-linux-arm
          path: _packages/tsgo-linux-arm

      - name: Build CLI bundle
        run: pnpm build:cli

      - name: Publish to npm
        run: pnpm changeset publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
