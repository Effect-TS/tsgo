name: Update TypeScript-Go

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: update-typescript-go-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update:
    name: Update submodule
    if: github.repository_owner == 'Effect-TS'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-build-update-typescript-go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-update-typescript-go-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Record current TypeScript-Go commit
        id: before
        run: echo "sha=$(git -C typescript-go rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update TypeScript-Go submodule
        run: git submodule update --init --remote typescript-go

      - name: Regenerate shims and generated files
        run: pnpm setup-repo --ci

      - name: Record updated TypeScript-Go commit
        id: after
        run: echo "sha=$(git -C typescript-go rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build upstream changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          before="${{ steps.before.outputs.sha }}"
          after="${{ steps.after.outputs.sha }}"
          compare_url="https://github.com/microsoft/typescript-go/compare/${before}...${after}"
          commits="$(gh api \
            repos/microsoft/typescript-go/compare/${before}...${after} \
            --jq '.commits[] | "- [\(.sha[0:7])](https://github.com/microsoft/typescript-go/commit/\(.sha)) \(.commit.message | split("\n")[0])"')"

          {
            echo "compare_url=${compare_url}"
            echo "commits<<EOF"
            printf '%s\n' "$commits"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Write changeset
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cat > .changeset/update-typescript-go.md <<EOF
          ---
          "@effect/tsgo": patch
          ---

          Update \
          [\`typescript-go\`](https://github.com/microsoft/typescript-go/commit/${{ steps.after.outputs.sha }}) \
          to commit \`${{ steps.after.outputs.sha }}\`.
          EOF

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-typescript-go
          delete-branch: true
          commit-message: "chore: update typescript-go"
          title: "chore: update typescript-go"
          body: |
            Automated update of the `typescript-go` submodule and regenerated shim/codegen output.

            ## TypeScript-Go

            - Previous commit: `${{ steps.before.outputs.sha }}`
            - Updated commit: `${{ steps.after.outputs.sha }}`
            - Compare: ${{ steps.changelog.outputs.compare_url }}

            ## Upstream commits

            ${{ steps.changelog.outputs.commits }}

            ---

            *This PR was automatically generated by the TypeScript-Go update workflow.*
          labels: automated
